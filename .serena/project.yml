# the name by which the project can be referenced within Serena
project_name: "opencode-token-reduce"

# list of languages for which language servers are started
languages: [markdown, json, bash]

# the encoding used by text files in the project
encoding: "utf-8"

# whether to use project's .gitignore files to ignore files
ignore_all_files_in_gitignore: true

# list of mode names that are to be activated by default
default_modes:

# list of mode names to be activated additionally for this project
added_modes:

# list of tool names to exclude
excluded_tools: []

# list of optional tools to include
included_optional_tools: []

# fixed set of tools
fixed_tools: []

# time budget (seconds) per tool call for symbol info retrieval
symbol_info_budget:

# language backend
language_backend:

# line ending convention
line_ending:

# regex patterns for read-only memory entries
read_only_memory_patterns: []

# regex patterns for ignored memories
ignored_memory_patterns: []

# language server-specific options
ls_specific_settings: {}

# additional paths to ignore
ignored_paths: []

# additional workspace folders
additional_workspace_folders: []

# read-only mode
read_only: false

# initial prompt
initial_prompt: ''
